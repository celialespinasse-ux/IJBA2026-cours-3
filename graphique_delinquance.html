            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 16px;
            flex-grow: 1;
        }
        label {

const years = rawData.years;
const cities = Object.keys(rawData.data);
const select = document.getElementById('citySelect');
const ctx = document.getElementById('delinquanceChart').getContext('2d');
let myChart;

// Populate dropdown
cities.forEach(city => {
    const option = document.createElement('option');
    option.value = city;
    option.text = city;
    select.appendChild(option);
});

function updateChart(cityName) {
    const cityData = rawData.data[cityName];
    
    const datasets = [
        {
            label: 'Vols (total)',
            data: cityData['Vols (total)'],
            borderColor: 'rgb(255, 99, 132)',
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            tension: 0.1,
            fill: false
        },
        {
            label: 'Violences hors cadre familial',
            data: cityData['Violences hors cadre familial'],
            borderColor: 'rgb(54, 162, 235)',
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            tension: 0.1,
            fill: false
        },
        {
            label: 'Cambriolages',
            data: cityData['Cambriolages'],
            borderColor: 'rgb(75, 192, 192)',
            backgroundColor: 'rgba(75, 192, 192, 0.2)',
            tension: 0.1,
            fill: false
        }
    ];

    if (myChart) {
        myChart.destroy();
    }

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: years,
            datasets: datasets
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Détail pour ' + cityName
                },
                legend: {
                    position: 'bottom'
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Taux pour 1000 habitants'
                    }
                }
            }
        }
    });
}

// Initial chart
updateChart(cities[0]);

// Event listener
select.addEventListener('change', (e) => {
    updateChart(e.target.value);
});
