<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification GPS - Inclusion Numérique</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            font-size: 12px;
        }
        .header-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header-title">Vérification des coordonnées GPS (Vue Satellite Esri)</div>
    <div id="map"></div>
    <div class="legend">
        <strong>Légende</strong><br>
        ● Lieu d'inclusion numérique<br>
        <small>Données : Bordeaux Métropole</small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        console.log("Initialisation de la carte...");
        const map = L.map('map').setView([44.837789, -0.57918], 12);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}{r}.png', {
            attribution: 'Stamen',
            subdomains: 'abcd',
            opacity: 0.7
        }).addTo(map);

        const csvFile = "lieux.csv";
        console.log("Tentative de chargement du fichier :", csvFile);

        Papa.parse(csvFile, {
            download: true,
            header: true,
            delimiter: ";",
            complete: function(results) {
                console.log("Fichier CSV chargé avec succès ! Nombre de lignes :", results.data.length);
                let pointsAjoutes = 0;

                results.data.forEach((row, index) => {
                    const lat = parseFloat(row.latitude);
                    const lng = parseFloat(row.longitude);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.circleMarker([lat, lng], {
                            radius: 6,
                            fillColor: "#00ff00",
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map)
                        .bindPopup(`<strong>${row.nom}</strong><br>Coords: ${lat}, ${lng}`);
                        pointsAjoutes++;
                    }
                });
                console.log("Nombre de points ajoutés à la carte :", pointsAjoutes);
                
                if (pointsAjoutes === 0) {
                    console.error("Aucun point n'a pu être ajouté. Vérifiez les noms des colonnes 'latitude' et 'longitude' dans le CSV.");
                    console.log("Première ligne du CSV pour vérification :", results.data[0]);
                }
            },
            error: function(err) {
                console.error("Erreur lors du chargement du CSV :", err);
            }
        });
    </script>
</body>
</html>
