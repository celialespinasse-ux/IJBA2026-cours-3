<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de l'Inclusion Numérique - Bordeaux Métropole</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // Initialisation de la carte centrée sur Bordeaux
        const map = L.map('map').setView([44.837789, -0.57918], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Chargement et traitement du CSV
        // Note : On utilise le nom exact du fichier présent dans le dossier
        const csvFile = "RAW_met_lieux_inclusion_numerique - RAW_met_lieux_inclusion_numerique (3).csv";

        Papa.parse(csvFile, {
            download: true,
            header: true,
            delimiter: ";",
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.latitude);
                    const lng = parseFloat(row.longitude);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const marker = L.marker([lat, lng]).addTo(map);
                        marker.bindPopup(`
                            <strong>${row.nom}</strong><br>
                            ${row.type_lieu}<br>
                            <em>${row.adresse_commune}</em><br>
                            <small>${row.contact_telephone || ''}</small>
                        `);
                    }
                });
            },
            error: function(err) {
                console.error("Erreur lors du chargement du CSV:", err);
            }
        });
    </script>
</body>
</html>
