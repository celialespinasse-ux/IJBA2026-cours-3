<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Municipale - Vue Satellite Bordeaux Métropole</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #000; }
        .legend {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1.6em;
            font-size: 12px;
            color: #333;
        }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 1; border: 1px solid #000; border-radius: 50%; }
        .info-box {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #444;
        }
        .info-box h1 { margin: 0; font-size: 16px; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Carte de Localisation : Effectifs de Police 2024</h1>
        <div style="font-size: 11px;">Fond Satellite Esri World Imagery</div>
    </div>
    <div id="map"></div>

    <script>
        // Coordonnées de Bordeaux Métropole
        const map = L.map('map').setView([44.86, -0.58], 11);

        // FOND SATELLITE (Esri World Imagery) - Pas d'OpenStreetMap
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        }).addTo(map);

        // Lecture DIRECTE du CSV "police_map_data.csv"
        Papa.parse("police_map_data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.lat);
                    const lng = parseFloat(row.lng);
                    const agents = parseInt(row.agents);
                    const densite = parseFloat(row.densite);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        // Couleurs très vives pour le fond satellite (Néon/Flashy)
                        const color = densite > 0.6 ? "#FF0000" : // Rouge flash
                                      densite > 0.4 ? "#FF8C00" : // Orange foncé
                                      densite > 0.2 ? "#FFFF00" : // Jaune flash
                                      agents > 0    ? "#00FF00" : // Vert flash
                                                      "#FFFFFF";  // Blanc (aucun agent)

                        // Marqueurs circulaires plus visibles avec bordure noire
                        const marker = L.circleMarker([lat, lng], {
                            radius: agents === 0 ? 5 : Math.max(8, Math.sqrt(agents) * 3),
                            fillColor: color,
                            color: "#fff", // Bordure blanche pour contraste
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        marker.bindPopup(`
                            <div style="text-align:center;">
                                <b style="font-size:14px;">${row.commune}</b><br>
                                <hr style="margin:5px 0;">
                                <b>Effectif :</b> ${agents} agents<br>
                                <b>Densité :</b> ${densite} agents / 1000 hab.
                            </div>
                        `);
                    }
                });
            }
        });

        // Légende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>Densité / 1000 hab.</b><br>' +
                '<i style="background: #FF0000"></i> > 0.6<br>' +
                '<i style="background: #FF8C00"></i> 0.4 - 0.6<br>' +
                '<i style="background: #FFFF00"></i> 0.2 - 0.4<br>' +
                '<i style="background: #00FF00"></i> < 0.2<br>' +
                '<i style="background: #FFFFFF"></i> Aucun service';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
