<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification GPS - Inclusion Numérique</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            font-size: 12px;
        }
        .header-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header-title">Vérification des coordonnées GPS (Vue Satellite Esri)</div>
    <div id="map"></div>
    <div class="legend">
        <strong>Légende</strong><br>
        ● Lieu d'inclusion numérique<br>
        <small>Données : Bordeaux Métropole</small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // Initialisation de la carte
        const map = L.map('map').setView([44.837789, -0.57918], 12);

        // Remplacement d'OpenStreetMap par Esri World Imagery (Satellite)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        }).addTo(map);

        // Ajout des noms de rues par-dessus le satellite pour mieux se repérer
        L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}{r}.png', {
            attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>',
            subdomains: 'abcd',
            opacity: 0.7
        }).addTo(map);

        // Lecture du CSV
        const csvFile = "RAW_met_lieux_inclusion_numerique - RAW_met_lieux_inclusion_numerique (3).csv";

        Papa.parse(csvFile, {
            download: true,
            header: true,
            delimiter: ";",
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.latitude);
                    const lng = parseFloat(row.longitude);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const marker = L.circleMarker([lat, lng], {
                            radius: 6,
                            fillColor: "#00ff00", // Vert fluo pour bien voir sur le satellite
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        marker.bindPopup(`
                            <div style="min-width: 200px">
                                <h3 style="margin:0 0 5px 0; color:#2c3e50;">${row.nom}</h3>
                                <strong>Coords :</strong> ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
                                <strong>Adresse :</strong> ${row.adresse_brut || row.adresse_commune}<br>
                                <hr>
                                <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank" style="color:#3498db;">Vérifier sur Google Maps</a>
                            </div>
                        `);
                    }
                });
            }
        });
    </script>
</body>
</html>
