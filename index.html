<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évolution Police Municipale - Bordeaux Métropole</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #000; }
        .legend {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1.6em;
            font-size: 13px;
        }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 50%; border: 1px solid #000; }
        .info-box {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            border-left: 5px solid #f1c40f;
        }
        .info-box h1 { margin: 0; font-size: 18px; color: #f1c40f; }
        .popup-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .popup-table th, .popup-table td { border: 1px solid #ddd; padding: 5px; text-align: center; font-size: 12px; }
        .popup-table th { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Police Municipale : Évolution 2020-2024</h1>
        <div style="font-size: 12px; color: #bdc3c7;">Cliquez sur un point pour voir l'historique</div>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([44.86, -0.58], 11);

        // Fond Satellite Esri (Pas d'OpenStreetMap)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        }).addTo(map);

        // Lecture du CSV d'évolution
        Papa.parse("police_evolution.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.lat);
                    const lng = parseFloat(row.lng);
                    const agents2024 = parseInt(row['2024']);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        // Couleur vive pour visibilité max sur satellite
                        let color = "#00FF00"; // Vert par défaut
                        if (agents2024 > 100) color = "#FF0000"; // Rouge (Bordeaux)
                        else if (agents2024 > 20) color = "#FF8C00"; // Orange
                        else if (agents2024 > 10) color = "#FFFF00"; // Jaune
                        else if (agents2024 === 0) color = "#FFFFFF"; // Blanc

                        const radius = agents2024 === 0 ? 5 : Math.max(7, Math.sqrt(agents2024) * 3);

                        const marker = L.circleMarker([lat, lng], {
                            radius: radius,
                            fillColor: color,
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        // Popup avec tableau d'évolution
                        let popupContent = `<div style="min-width:200px">
                            <h3 style="margin:0; border-bottom:2px solid ${color}; padding-bottom:5px;">${row.commune}</h3>
                            <table class="popup-table">
                                <tr><th>Année</th><th>Effectif</th></tr>
                                <tr><td>2020</td><td>${row['2020']}</td></tr>
                                <tr><td>2021</td><td>${row['2021']}</td></tr>
                                <tr><td>2022</td><td>${row['2022']}</td></tr>
                                <tr><td>2023</td><td>${row['2023']}</td></tr>
                                <tr style="font-weight:bold; background:#fff9db;"><td>2024</td><td>${row['2024']}</td></tr>
                            </table>
                        </div>`;

                        marker.bindPopup(popupContent);
                    }
                });
            }
        });

        // Légende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>Effectifs 2024</b><br>' +
                '<i style="background: #FF0000"></i> > 100 agents<br>' +
                '<i style="background: #FF8C00"></i> 21 - 100 agents<br>' +
                '<i style="background: #FFFF00"></i> 11 - 20 agents<br>' +
                '<i style="background: #00FF00"></i> 1 - 10 agents<br>' +
                '<i style="background: #FFFFFF"></i> Aucun service';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
