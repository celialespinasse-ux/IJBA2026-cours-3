<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Inclusion Numérique - Bordeaux Métropole</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; background: #000; }
        body { margin: 0; padding: 0; }
        .info {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div class="info">
        <b>Inclusion Numérique</b><br>
        Bordeaux Métropole
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // Initialisation centrée sur Bordeaux
        const map = L.map('map').setView([44.84, -0.58], 11);

        // Couche Satellite (Esri)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // 1. AFFICHAGE DES LIMITES DE LA METROPOLE
        // Source : GeoJSON des communes de France
        fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements/33-gironde/communes-33-gironde.geojson')
            .then(response => response.json())
            .then(data => {
                const codesInseeMetropole = [
                    "33003", "33004", "33013", "33032", "33039", "33056", "33063", "33069", "33075", "33096", 
                    "33119", "33162", "33167", "33192", "33200", "33249", "33273", "33281", "33312", "33318", 
                    "33433", "33449", "33519", "33522", "33533", "33540", "33550", "33563"
                ];

                L.geoJSON(data, {
                    filter: function(feature) {
                        return codesInseeMetropole.includes(feature.properties.code);
                    },
                    style: {
                        color: "#ffffff",
                        weight: 2,
                        fillOpacity: 0.1,
                        dashArray: "5, 5"
                    }
                }).addTo(map);
            });

        // 2. AFFICHAGE DES POINTS DEPUIS LE CSV
        Papa.parse("lieux.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Données chargées :", results.data);
                
                results.data.forEach(row => {
                    // Nettoyage des noms de colonnes et des valeurs
                    const latAttr = row.latitude || row.Latitude || row["latitude"];
                    const lngAttr = row.longitude || row.Longitude || row["longitude"];
                    
                    if (latAttr && lngAttr) {
                        const lat = parseFloat(String(latAttr).replace(',', '.'));
                        const lng = parseFloat(String(lngAttr).replace(',', '.'));

                        if (!isNaN(lat) && !isNaN(lng)) {
                            L.circleMarker([lat, lng], {
                                radius: 6,
                                fillColor: "#ffff00", // JAUNE pour contraste maximal sur satellite
                                color: "#000",
                                weight: 1,
                                opacity: 1,
                                fillOpacity: 0.9
                            })
                            .addTo(map)
                            .bindPopup(`<b>${row.nom}</b><br>${row.adresse_commune}`);
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
