<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effectifs de Police Municipale - Métropole de Bordeaux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            line-height: 1.5;
        }
        .popup-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .popup-table th, .popup-table td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        .popup-table th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Initialisation de la carte centrée sur Bordeaux
        const map = L.map('map').setView([44.84, -0.58], 11);
        
        // Fond de carte (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Chargement et parsing du CSV
        Papa.parse("police_map_data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.lat);
                    const lng = parseFloat(row.lng);
                    const agents2024 = row.agents_2024 === "N/A" ? 0 : parseInt(row.agents_2024);
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        // Calcul du rayon proportionnel (racine carrée pour la surface)
                        const radius = Math.max(5, Math.sqrt(agents2024) * 4);
                        
                        const color = agents2024 > 100 ? "#800026" :
                                      agents2024 > 50  ? "#BD0026" :
                                      agents2024 > 20  ? "#E31A1C" :
                                      agents2024 > 10  ? "#FC4E2A" :
                                      agents2024 > 5   ? "#FD8D3C" :
                                                        "#FEB24C";

                        const marker = L.circleMarker([lat, lng], {
                            radius: radius,
                            fillColor: color,
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);

                        // Construction de la popup avec l'historique
                        let popupContent = `<b>${row.commune}</b><br/>`;
                        popupContent += `<table class="popup-table">
                            <tr><th>Année</th><th>Effectif</th></tr>
                            <tr><td>2020</td><td>${row.agents_2020}</td></tr>
                            <tr><td>2021</td><td>${row.agents_2021}</td></tr>
                            <tr><td>2022</td><td>${row.agents_2022}</td></tr>
                            <tr><td>2023</td><td>${row.agents_2023}</td></tr>
                            <tr style="font-weight:bold;"><td>2024</td><td>${row.agents_2024}</td></tr>
                        </table>`;

                        marker.bindPopup(popupContent);
                    }
                });
            }
        });

        // Ajout d'une légende simple
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>Effectifs 2024</b><br>' +
                '<i style="background: #FEB24C; width: 10px; height: 10px; display: inline-block;"></i> 1-5 agents<br>' +
                '<i style="background: #FD8D3C; width: 10px; height: 10px; display: inline-block;"></i> 6-10 agents<br>' +
                '<i style="background: #FC4E2A; width: 10px; height: 10px; display: inline-block;"></i> 11-20 agents<br>' +
                '<i style="background: #E31A1C; width: 10px; height: 10px; display: inline-block;"></i> 21-50 agents<br>' +
                '<i style="background: #BD0026; width: 10px; height: 10px; display: inline-block;"></i> 51-100 agents<br>' +
                '<i style="background: #800026; width: 10px; height: 10px; display: inline-block;"></i> > 100 agents';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
